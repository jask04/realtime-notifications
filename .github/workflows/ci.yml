name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any older run on the same branch when a new push lands — saves
# minutes when pushing several commits in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest

    services:
      # Mirror docker-compose.yml: same image, same db/user/password the
      # local dev environment uses. DATABASE_URL below points at this.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: notifications
          POSTGRES_USER: notifications
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notifications -d notifications"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://notifications:dev@localhost:5432/notifications
      REDIS_URL: redis://localhost:6379
      # Min-length 16 per the Zod schema; not a real secret.
      JWT_SECRET: ci-jwt-secret-not-for-production
      NODE_ENV: test
      # SMTP creds are placeholders — the email worker test mocks the mailer
      # so nothing actually opens an SMTP connection.
      SMTP_HOST: localhost
      SMTP_PORT: "2525"
      SMTP_USER: ci-placeholder
      SMTP_PASS: ci-placeholder
      SMTP_FROM: ci@example.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
